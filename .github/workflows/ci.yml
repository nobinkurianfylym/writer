name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Set repo secrets TURBO_TOKEN/TURBO_TEAM to enable Turborepo remote caching
  # (https://turbo.build/repo/docs/core-concepts/remote-caching). Turbo runs
  # fine without them — it just falls back to the actions/cache below.
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  ci:
    name: lint, typecheck, test, build
    runs-on: ubuntu-latest
    # E1-5's own perf budget is enforced separately in-suite; this is a
    # CI-wedge guard so a hung job fails fast instead of idling for hours.
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fylym
          POSTGRES_PASSWORD: fylym
          POSTGRES_DB: fylym
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fylym -d fylym"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://fylym:fylym@localhost:5432/fylym
      REDIS_URL: redis://localhost:6379
      S3_ENDPOINT: http://localhost:9000
      NEXT_PUBLIC_API_URL: http://localhost:3001
      PORT: 3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Lint
        run: corepack pnpm lint

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Test
        run: corepack pnpm test

      - name: Build
        run: corepack pnpm build

      # E1-10 accept criterion: "Typedoc builds warning-free in CI".
      # typedoc.json sets treatWarningsAsErrors + validation.notDocumented,
      # so a missing TSDoc comment on any exported symbol fails this step.
      - name: API docs (typedoc)
        run: corepack pnpm docs

      # The golden corpus conformance suite (src/golden) is already a
      # required check via the Test step above (vitest picks up
      # golden.test.ts along with everything else in the package). This
      # extra run is solely to produce the JSON conformance report as a
      # reviewable CI artifact — it re-runs already-green tests, so it
      # should never itself introduce a failure the Test step didn't
      # already catch.
      - name: Golden corpus conformance report
        run: corepack pnpm --filter @fylym/screenplay-core test:golden:report

      - name: Upload golden conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-conformance-report
          path: packages/screenplay-core/golden-conformance-report.json
          retention-days: 90
