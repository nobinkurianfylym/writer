name: Security

# §9 security gates: dependency audit, static analysis (Semgrep), and a
# committed-secrets scan. Runs on PRs and pushes to main; a finding fails CI.
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly baseline

permissions:
  contents: read

jobs:
  secrets:
    name: secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: bash scripts/secrets-scan.sh

  dependencies:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Fail the build on a high/critical advisory in the dependency tree.
      - run: pnpm audit --audit-level high

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci
        env:
          SEMGREP_RULES: >-
            p/typescript
            p/react
            p/nodejs
            p/owasp-top-ten
            p/secrets
